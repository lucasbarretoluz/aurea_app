name: aurea_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  bloc: ^9.0.1
  flutter_bloc: ^9.1.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  go_router: ^16.2.4
  shared_preferences: ^2.5.3
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1
  firebase_auth: ^6.1.1
  firebase_core: ^4.2.1
  toastification: ^3.0.3
  get_it: ^8.2.0
  dio: ^5.9.0
  flutter_dotenv: ^5.2.1
  flutter_secure_storage: ^9.2.4
  in_app_purchase: ^3.2.3
  hydrated_bloc: ^10.0.0
  path_provider: ^2.1.5
  local_auth: ^2.3.0
  local_auth_darwin: ^1.4.3
  local_auth_android: ^1.0.49
  flutter_svg: ^2.0.6
  image_picker: ^1.1.2
  image_cropper: ^5.0.1
  cached_network_image: ^3.3.1


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  freezed: ^3.0.6
  build_runner: 2.4.15
  json_serializable: 6.9.5
  mocktail: ^1.0.0
  bloc_test: ^10.0.0
  integration_test:
    sdk: flutter  

flutter:
  uses-material-design: true

  assets:
    - .env.dev
    - assets/images/
    - assets/icons/

  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Thin.ttf
          weight: 100
        - asset: assets/fonts/Montserrat-ThinItalic.ttf
          weight: 100
          style: italic
        - asset: assets/fonts/Montserrat-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Montserrat-ExtraLightItalic.ttf
          weight: 200
          style: italic
        - asset: assets/fonts/Montserrat-Light.ttf
          weight: 300
        - asset: assets/fonts/Montserrat-LightItalic.ttf
          weight: 300
          style: italic
        - asset: assets/fonts/Montserrat-Regular.ttf
          weight: 400
        - asset: assets/fonts/Montserrat-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/Montserrat-Medium.ttf
          weight: 500
        - asset: assets/fonts/Montserrat-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/Montserrat-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Montserrat-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/Montserrat-Bold.ttf
          weight: 700
        - asset: assets/fonts/Montserrat-BoldItalic.ttf
          weight: 700
          style: italic
        - asset: assets/fonts/Montserrat-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Montserrat-ExtraBoldItalic.ttf
          weight: 800
          style: italic
        - asset: assets/fonts/Montserrat-Black.ttf
          weight: 900
        - asset: assets/fonts/Montserrat-BlackItalic.ttf
          weight: 900
          style: italic
